name: Build

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: make test

      - name: Build
        run: make build

      - name: Upload builds
        uses: actions/upload-artifact@v6
        with:
          name: keepy-${{ github.ref_name }}
          path: bin/*
          if-no-files-found: error
